<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav>
        <div class="logo">
            My Currency Converter
        </div>
        <ul>
            <li><a href="/home">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact US</a></li>
        </ul>
    </nav>
    
    <div class="container">
        <h1>Choose a currency to convert</h1>
        <form action="/action.php" method="get">
            <label for="quantity">Choose a quantity:</label>
            <input type="number" name="quantity" min="1" max="10">
            <label for="currency">Choose a currency:</label>
            <select name="currency"><option value="INR">Indian Rupee</option><option value="USD">US Dollar</option><option value="EUR">Euro</option></select>
            <button class="btn" type="submit">submit</button>

        </form>
        <div class="output">
            <table>
                <caption class="CCT">Converted Currency Table</caption>
                <thead>
                    <tr>
                        <th>Currency</th>
                        <th>Currency Code</th> 
                        <th>Value</th> 
                    </tr>
                </thead>
                <tbody>
                   
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        Copyright &copy; All rights reserved
    </footer>
    <script src="script.js"></script>
</body>
</html>
