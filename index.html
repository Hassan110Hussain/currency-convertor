<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">💱 Currency Converter</div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        <div class="hero">
            <h1>Real-Time Currency Converter</h1>
            <p>Convert currencies instantly with live exchange rates</p>
        </div>

        <div class="converter-card">
            <form class="converter-form">
                <div class="form-group">
                    <label for="quantity">Amount</label>
                    <input type="number" id="quantity" name="quantity" min="1" placeholder="Enter amount" required>
                </div>

                <div class="form-group">
                    <label for="currency">From Currency</label>
                    <select id="currency" name="currency">
                        <option value="USD">🇺🇸 US Dollar (USD)</option>
                        <option value="EUR">🇪🇺 Euro (EUR)</option>
                        <option value="INR">🇮🇳 Indian Rupee (INR)</option>
                        <option value="GBP">🇬🇧 British Pound (GBP)</option>
                        <option value="JPY">🇯🇵 Japanese Yen (JPY)</option>
                        <option value="AUD">🇦🇺 Australian Dollar (AUD)</option>
                    </select>
                </div>

                <button class="btn btn-convert" type="submit">Convert Now</button>
                <div class="loading" id="loading">⏳ Loading exchange rates...</div>
                <div class="error" id="error"></div>
            </form>
        </div>

        <div class="output">
            <h2>Conversion Results</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Currency</th>
                            <th>Code</th> 
                            <th>Converted Amount</th> 
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Currency Converter. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
